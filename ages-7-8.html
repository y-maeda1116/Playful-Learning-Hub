<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7〜8歳 | わくわく学びランド</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>7〜8歳向けコンテンツ</h1>
        <p>基礎定着</p>
    </header>

    <main>
        <!-- ゲーム選択ナビゲーション -->
        <div class="game-navigation" role="navigation" aria-label="ゲーム選択">
            <h2>どのゲームであそぶ？</h2>
            <div class="game-selector" role="tablist">
                <button id="math-battle-btn" class="game-nav-button active"
                        role="tab" aria-selected="true" aria-controls="math-battle-section"
                        aria-label="算数バトル">
                    <span class="game-icon" aria-hidden="true">⚔️</span>
                    <span class="game-title">算数バトル</span>
                    <span class="game-description">たしざんひきざん</span>
                </button>
                <button id="kuku-battle-btn" class="game-nav-button"
                        role="tab" aria-selected="false" aria-controls="kuku-battle-section"
                        aria-label="九九バトル">
                    <span class="game-icon" aria-hidden="true">✖️</span>
                    <span class="game-title">九九バトル</span>
                    <span class="game-description">かけざんバトル</span>
                </button>
                <button id="kanji-puzzle-btn" class="game-nav-button"
                        role="tab" aria-selected="false" aria-controls="kanji-puzzle-section"
                        aria-label="漢字パズル">
                    <span class="game-icon" aria-hidden="true">漢</span>
                    <span class="game-title">漢字パズル</span>
                    <span class="game-description">かんじをならおう</span>
                </button>
                <button id="word-relay-btn" class="game-nav-button"
                        role="tab" aria-selected="false" aria-controls="word-relay-section"
                        aria-label="ことばリレー">
                    <span class="game-icon" aria-hidden="true">🔗</span>
                    <span class="game-title">ことばリレー</span>
                    <span class="game-description">しりとりあそび</span>
                </button>
            </div>
        </div>

        <!-- 算数バトルセクション -->
        <div id="math-battle-section" class="game-section active"
             role="tabpanel" aria-labelledby="math-battle-btn">
            <div id="math-battle-game">
                <h2>モンスター算数バトル</h2>
                <p>ここにゲームが入ります。</p>
            </div>
        </div>

        <!-- 九九バトルセクション -->
        <div id="kuku-battle-section" class="game-section"
             role="tabpanel" aria-labelledby="kuku-battle-btn" aria-hidden="true">
            <div id="multiplication-battle-game"></div>
        </div>

        <!-- 漢字パズルセクション -->
        <div id="kanji-puzzle-section" class="game-section"
             role="tabpanel" aria-labelledby="kanji-puzzle-btn" aria-hidden="true">
            <div id="kanji-puzzle-game-container"></div>
        </div>

        <!-- ことばリレーセクション -->
        <div id="word-relay-section" class="game-section"
             role="tabpanel" aria-labelledby="word-relay-btn" aria-hidden="true">
            <div id="word-relay-game"></div>
        </div>

        <a href="index.html" class="back-link">トップにもどる</a>
    </main>

    <footer>
        <p>&copy; 2024 わくわく学びランド</p>
    </footer>

    <script src="math-battle.js"></script>
    <script src="multiplication-battle.js"></script>
    <script src="kanji-data.js"></script>
    <script src="kanji-puzzle.js"></script>
    <script src="word-relay.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var kanjiPuzzleInstance = null;

            function switchToGame(gameType) {
                document.querySelectorAll('.game-section').forEach(function(section) {
                    section.classList.remove('active');
                });
                document.querySelectorAll('.game-nav-button').forEach(function(btn) {
                    btn.classList.remove('active');
                    btn.setAttribute('aria-selected', 'false');
                });

                var section = document.getElementById(gameType + '-section');
                var btn = document.getElementById(gameType + '-btn');
                if (section) section.classList.add('active');
                if (btn) {
                    btn.classList.add('active');
                    btn.setAttribute('aria-selected', 'true');
                }

                if (gameType === 'kanji-puzzle' && !kanjiPuzzleInstance) {
                    var container = document.getElementById('kanji-puzzle-game-container');
                    if (container && typeof KanjiPuzzle !== 'undefined') {
                        kanjiPuzzleInstance = new KanjiPuzzle(container, { ageGroup: '7-8' });
                    }
                }
            }

            document.getElementById('math-battle-btn').addEventListener('click', function() {
                switchToGame('math-battle');
            });
            document.getElementById('kuku-battle-btn').addEventListener('click', function() {
                switchToGame('kuku-battle');
            });
            document.getElementById('kanji-puzzle-btn').addEventListener('click', function() {
                switchToGame('kanji-puzzle');
            });
            document.getElementById('word-relay-btn').addEventListener('click', function() {
                switchToGame('word-relay');
            });

            switchToGame('math-battle');
        });
    </script>
</body>
</html>
