<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9〜10歳 | わくわく学びランド</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>9〜10歳向けコンテンツ</h1>
        <p>応用力</p>
    </header>

    <main>
        <div id="fraction-pizza-game">
            <h2>分数のピザ屋さん</h2>
            <p>ここにゲームが入ります。</p>
        </div>

        <div id="astronomy-simulation">
            <h2>天体観測シミュレーション</h2>
            <div id="simulation-controls">
                <label for="date-picker">日付:</label>
                <input type="date" id="date-picker">
                <label for="time-picker">時間:</label>
                <input type="time" id="time-picker">
            </div>
            <canvas id="sky-canvas" width="800" height="600"></canvas>
            <div id="info-display">
                <p>星や惑星をクリックして情報を表示</p>
            </div>
        </div>

        <a href="index.html" class="back-link">トップにもどる</a>
    </main>

    <footer>
        <p>&copy; 2024 わくわく学びランド</p>
    </footer>

    <script src="fraction-pizza.js"></script>
    <script src="astronomy-sim.js"></script>
</body>
</html>
