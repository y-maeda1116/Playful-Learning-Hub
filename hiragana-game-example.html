<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ひらがな・カタカナ学習ゲーム - デモ</title>
    <link rel="stylesheet" href="hiragana-learning.css">
    <style>
        body {
            font-family: 'Hiragino Sans', 'Yu Gothic', sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #74b9ff 0%, #0984e3 100%);
            min-height: 100vh;
        }
        
        .demo-container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .demo-header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .demo-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .demo-button {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .demo-button:hover {
            background: white;
            transform: translateY(-2px);
        }
        
        .demo-button.active {
            background: #00b894;
            color: white;
        }
        
        #game-container {
            min-height: 600px;
        }
    </style>
</head>
<body>
    <div class="demo-container">
        <div class="demo-header">
            <h1>🎌 ひらがな・カタカナ学習ゲーム</h1>
            <p>年齢に合わせた楽しい文字学習ゲームです</p>
        </div>
        
        <div class="demo-controls">
            <button class="demo-button active" onclick="startGame('3-4', 'hiragana')">
                3-4歳向け ひらがな
            </button>
            <button class="demo-button" onclick="startGame('5-6', 'hiragana')">
                5-6歳向け ひらがな
            </button>
            <button class="demo-button" onclick="startGame('5-6', 'katakana')">
                5-6歳向け カタカナ
            </button>
            <button class="demo-button" onclick="startGame('5-6', 'mixed')">
                5-6歳向け ミックス
            </button>
        </div>
        
        <div id="game-container"></div>
    </div>

    <script src="character-data.js"></script>
    <script src="hiragana-learning.js"></script>
    <script>
        let currentGame = null;
        
        function startGame(ageGroup, mode) {
            // 既存のゲームを破棄
            if (currentGame) {
                currentGame.destroy();
            }
            
            // ボタンの状態を更新
            document.querySelectorAll('.demo-button').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // ゲームコンテナをクリア
            const container = document.getElementById('game-container');
            container.innerHTML = '';
            
            // 新しいゲームを開始
            currentGame = new HiraganaLearningGame(ageGroup, container, { mode });
            
            console.log(`ゲーム開始: ${ageGroup}歳向け ${mode}モード`);
            console.log(`利用可能文字数: ${currentGame.characters.length}`);
            console.log(`選択肢数: ${currentGame.difficultySettings.choiceCount}`);
        }
        
        // 初期ゲームを開始
        window.addEventListener('load', () => {
            startGame('3-4', 'hiragana');
        });
    </script>
</body>
</html>
