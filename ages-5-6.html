<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5〜6歳 | わくわく学びランド</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>5〜6歳向けコンテンツ</h1>
        <p>小学校入学準備</p>
    </header>

    <main>
        <!-- ゲーム選択ナビゲーション -->
        <div class="game-navigation" role="navigation" aria-label="ゲーム選択">
            <h2>どのゲームであそぶ？</h2>
            <div class="game-selector" role="tablist">
                <button id="shopping-game-btn" class="game-nav-button active"
                        role="tab" aria-selected="true" aria-controls="shopping-game-section"
                        aria-label="おかいものゲーム - かずをつかっておかいもの">
                    <span class="game-icon" aria-hidden="true">🛒</span>
                    <span class="game-title">おかいもの</span>
                    <span class="game-description">かずをつかっておかいもの</span>
                </button>
                <button id="hiragana-katakana-game-btn" class="game-nav-button"
                        role="tab" aria-selected="false" aria-controls="hiragana-katakana-learning-section"
                        aria-label="ひらがな・カタカナ学習ゲーム - もじをおぼえよう">
                    <span class="game-icon" aria-hidden="true">あア</span>
                    <span class="game-title">ひらがな・カタカナ</span>
                    <span class="game-description">もじをおぼえよう</span>
                </button>
            </div>
        </div>

        <!-- お買い物ゲームセクション -->
        <div id="shopping-game-section" class="game-section active">
            <div id="shopping-game">
                <h2>かずのおかいものゲーム</h2>
                <p>ここにゲームが入ります。</p>
            </div>
        </div>
        
        <!-- ひらがな・カタカナ学習セクション -->
        <div id="hiragana-katakana-learning-section" class="game-section"
             role="tabpanel" aria-labelledby="hiragana-katakana-game-btn" aria-hidden="true">
            <h2>ひらがな・カタカナ学習</h2>
            <div class="mode-selector" role="tablist" aria-label="学習モード選択">
                <button id="hiragana-mode" class="mode-button active"
                        role="tab" aria-selected="true" aria-label="ひらがなモード">ひらがな</button>
                <button id="katakana-mode" class="mode-button"
                        role="tab" aria-selected="false" aria-label="カタカナモード">カタカナ</button>
                <button id="mixed-mode" class="mode-button"
                        role="tab" aria-selected="false" aria-label="混合モード">混合</button>
            </div>
            <div id="hiragana-game-container" role="main" aria-live="polite"></div>
            <div id="progress-summary-container" role="complementary" aria-label="学習進捗"></div>
        </div>
        
        <div id="parent-controls" role="complementary" aria-label="保護者向けコントロール">
            <!-- 保護者向けボタンがここに追加されます -->
        </div>
        
        <a href="index.html" class="back-link">トップにもどる</a>
    </main>

    <footer>
        <p>&copy; 2024 わくわく学びランド</p>
    </footer>

    <script src="shopping-game.js"></script>
    <script src="character-data.js"></script>
    <script src="audio-manager.js"></script>
    <script src="progress-tracker.js"></script>
    <script src="badge-system.js"></script>
    <script src="gamification-system.js"></script>
    <script src="progress-display.js"></script>
    <script src="progress-integration.js"></script>
    <script src="word-formation-game.js"></script>
    <script src="writing-practice.js"></script>
    <script src="hiragana-learning.js"></script>
    <script>
        // スクリプト読み込み確認
        console.log('📦 スクリプト読み込み状況:');
        console.log('- Character:', typeof Character);
        console.log('- getCharacterSetForAge:', typeof getCharacterSetForAge);
        console.log('- AudioManager:', typeof AudioManager);
        console.log('- ProgressTracker:', typeof ProgressTracker);
        console.log('- HiraganaLearningGame:', typeof HiraganaLearningGame);
        
        // ページ読み込み後に初期化
        document.addEventListener('DOMContentLoaded', function() {
            console.log('📄 DOMContentLoaded イベント発火');
            
            // 必須スクリプトの読み込み確認
            const requiredScripts = {
                'HiraganaLearningGame': typeof HiraganaLearningGame !== 'undefined',
                'getCharacterSetForAge': typeof getCharacterSetForAge === 'function',
                'Character': typeof Character !== 'undefined'
            };
            
            const missingScripts = Object.entries(requiredScripts)
                .filter(([name, loaded]) => !loaded)
                .map(([name]) => name);
            
            if (missingScripts.length > 0) {
                console.error('❌ 必須スクリプトが読み込まれていません:', missingScripts);
                
                // エラーメッセージを表示
                const container = document.getElementById('hiragana-game-container');
                if (container) {
                    container.innerHTML = `
                        <div style="padding: 20px; background: #fff3cd; color: #856404; border-radius: 8px; text-align: center;">
                            <h3>⚠️ スクリプトの読み込みエラー</h3>
                            <p>必要なファイルが読み込まれていません:</p>
                            <ul style="text-align: left; display: inline-block;">
                                ${missingScripts.map(name => `<li>${name}</li>`).join('')}
                            </ul>
                            <p style="margin-top: 15px;">
                                <a href="debug-mobile.html" style="color: #856404; text-decoration: underline; font-weight: bold;">
                                    デバッグページで詳細を確認
                                </a>
                            </p>
                            <button onclick="location.reload()" style="padding: 10px 20px; background: #ffc107; color: #000; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px;">
                                ページを再読み込み
                            </button>
                        </div>
                    `;
                }
                return;
            }
            
            console.log('✅ すべての必須スクリプトが読み込まれました');
            // 進捗統合システムを初期化
            try {
                if (typeof progressIntegration !== 'undefined') {
                    progressIntegration.initialize();
                } else {
                    console.warn('ProgressIntegration not available');
                }
            } catch (error) {
                console.error('Progress integration initialization failed:', error);
            }
            
            let currentGame = null;
            let hiraganaGameInitialized = false;
            
            // ゲームナビゲーション機能
            function switchToGame(gameType) {
                // すべてのゲームセクションを非表示
                document.querySelectorAll('.game-section').forEach(section => {
                    section.classList.remove('active');
                });
                
                // すべてのナビゲーションボタンを非アクティブ
                document.querySelectorAll('.game-nav-button').forEach(btn => {
                    btn.classList.remove('active');
                });
                
                if (gameType === 'shopping') {
                    document.getElementById('shopping-game-section').classList.add('active');
                    document.getElementById('shopping-game-btn').classList.add('active');
                } else if (gameType === 'hiragana-katakana') {
                    document.getElementById('hiragana-katakana-learning-section').classList.add('active');
                    document.getElementById('hiragana-katakana-game-btn').classList.add('active');
                    
                    // ひらがな・カタカナ学習ゲームを初期化（まだ初期化されていない場合）
                    if (!hiraganaGameInitialized) {
                        initializeGame('hiragana');
                        hiraganaGameInitialized = true;
                    }
                }
            }
            
            // ひらがな・カタカナ学習ゲームを初期化
            function initializeGame(mode) {
                const container = document.getElementById('hiragana-game-container');
                
                try {
                    console.log('🎮 ゲーム初期化開始:', mode);
                    
                    // デバッグ情報を収集
                    const debugInfo = {
                        HiraganaLearningGame: typeof HiraganaLearningGame,
                        getCharacterSetForAge: typeof getCharacterSetForAge,
                        basicHiraganaData: typeof basicHiraganaData,
                        fullHiraganaData: typeof fullHiraganaData,
                        katakanaData: typeof katakanaData
                    };
                    console.log('📊 利用可能なリソース:', debugInfo);
                    
                    // 既存のゲームを破棄
                    if (currentGame && typeof currentGame.destroy === 'function') {
                        currentGame.destroy();
                    }
                    
                    // 必要なクラスが利用可能かチェック
                    if (typeof HiraganaLearningGame === 'undefined') {
                        throw new Error('HiraganaLearningGame クラスが読み込まれていません');
                    }
                    
                    // 文字データが利用可能かチェック
                    if (typeof getCharacterSetForAge !== 'function') {
                        throw new Error('getCharacterSetForAge 関数が読み込まれていません');
                    }
                    
                    // 新しいゲームを作成
                    console.log('🔨 HiraganaLearningGame インスタンスを作成中...');
                    currentGame = new HiraganaLearningGame(
                        '5-6', 
                        container,
                        {
                            mode: mode,
                            audio: { enabled: true }
                        }
                    );
                    
                    console.log('✅ ゲームインスタンス作成成功');
                    
                    // ゲームと進捗追跡を連携
                    if (typeof progressIntegration !== 'undefined' && 
                        typeof progressIntegration.connectGameToProgress === 'function') {
                        progressIntegration.connectGameToProgress(currentGame);
                        console.log('✅ 進捗追跡と連携完了');
                    }
                    
                    // 進捗サマリーを更新
                    if (typeof progressIntegration !== 'undefined' && 
                        typeof progressIntegration.showProgressSummary === 'function') {
                        progressIntegration.showProgressSummary('progress-summary-container');
                    }
                    
                    console.log(`🎉 ${mode}モードでゲームを初期化しました`);
                    
                } catch (error) {
                    console.error('❌ ゲーム初期化失敗:', error);
                    console.error('スタックトレース:', error.stack);
                    
                    // 詳細なエラーメッセージを表示
                    if (container) {
                        container.innerHTML = `
                            <div style="padding: 20px; background: #f8d7da; color: #721c24; border-radius: 8px;">
                                <h3 style="margin-top: 0;">⚠️ ゲームの読み込みに失敗しました</h3>
                                <p><strong>エラー:</strong> ${error.message}</p>
                                <details style="margin: 15px 0; text-align: left;">
                                    <summary style="cursor: pointer; font-weight: bold;">詳細情報を表示</summary>
                                    <pre style="background: #fff; padding: 10px; border-radius: 5px; overflow-x: auto; font-size: 12px; margin-top: 10px;">${error.stack || 'スタックトレースなし'}</pre>
                                </details>
                                <p style="font-size: 14px; margin: 15px 0;">
                                    <a href="debug-mobile.html" style="color: #721c24; text-decoration: underline;">
                                        デバッグページで詳細を確認
                                    </a>
                                </p>
                                <button onclick="location.reload()" style="padding: 10px 20px; background: #dc3545; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px;">
                                    ページを再読み込み
                                </button>
                            </div>
                        `;
                    }
                }
            }
            
            // ゲームナビゲーションボタンのイベントリスナー
            document.getElementById('shopping-game-btn').addEventListener('click', function() {
                switchToGame('shopping');
            });
            
            document.getElementById('hiragana-katakana-game-btn').addEventListener('click', function() {
                switchToGame('hiragana-katakana');
            });
            
            // モード切り替えボタンのイベントリスナー
            document.getElementById('hiragana-mode').addEventListener('click', function() {
                setActiveMode('hiragana', this);
                if (hiraganaGameInitialized) {
                    initializeGame('hiragana');
                }
            });
            
            document.getElementById('katakana-mode').addEventListener('click', function() {
                setActiveMode('katakana', this);
                if (hiraganaGameInitialized) {
                    initializeGame('katakana');
                }
            });
            
            document.getElementById('mixed-mode').addEventListener('click', function() {
                setActiveMode('mixed', this);
                if (hiraganaGameInitialized) {
                    initializeGame('mixed');
                }
            });
            
            // アクティブモードを設定
            function setActiveMode(mode, button) {
                document.querySelectorAll('.mode-button').forEach(btn => {
                    btn.classList.remove('active');
                    btn.setAttribute('aria-selected', 'false');
                });
                button.classList.add('active');
                button.setAttribute('aria-selected', 'true');
            }
            
            // 保護者向けボタンを追加
            try {
                if (typeof progressIntegration !== 'undefined' && 
                    typeof progressIntegration.addParentButton === 'function') {
                    progressIntegration.addParentButton('parent-controls', '保護者向け進捗確認');
                }
            } catch (error) {
                console.error('Failed to add parent button:', error);
            }
            
            // デフォルトでお買い物ゲームを表示
            switchToGame('shopping');
        });
    </script>
</body>
</html>
