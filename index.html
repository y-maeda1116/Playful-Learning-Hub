<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>わくわく学びランド</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>わくわく学びランド</h1>
        <p>遊びながら楽しく学べる、子どもたちのためのウェブサイト！</p>
    </header>

    <main>
        <h2>年齢を選んでね</h2>
        <nav class="age-groups">
            <a href="ages-1-2.html" class="age-group-card">
                <h3>1〜2歳</h3>
                <p>五感を刺激する感覚遊び</p>
            </a>
            <a href="ages-3-4.html" class="age-group-card">
                <h3>3〜4歳</h3>
                <p>知的好奇心と社会性</p>
            </a>
            <a href="ages-5-6.html" class="age-group-card">
                <h3>5〜6歳</h3>
                <p>小学校入学準備</p>
            </a>
            <a href="ages-7-8.html" class="age-group-card">
                <h3>7〜8歳 (小1・2)</h3>
                <p>基礎定着</p>
            </a>
            <a href="ages-9-10.html" class="age-group-card">
                <h3>9〜10歳 (小3・4)</h3>
                <p>応用力</p>
            </a>
            <a href="ages-11-12.html" class="age-group-card">
                <h3>11〜12歳 (小5・6)</h3>
                <p>探究学習</p>
            </a>
        </nav>

        <section id="user-content-section" class="user-content">
            <h2>みんなの作ったクイズ</h2>
            <div id="user-quiz-list"></div>

            <h3>新しいクイズを作る</h3>
            <form id="create-quiz-form">
                <div class="form-group">
                    <label for="quiz-title">クイズのタイトル</label>
                    <input type="text" id="quiz-title" required>
                </div>
                <div class="form-group">
                    <label for="quiz-question">問題文</label>
                    <input type="text" id="quiz-question" required>
                </div>
                <div class="form-group">
                    <label for="quiz-image">画像 (任意)</label>
                    <input type="file" id="quiz-image" accept="image/*">
                </div>
                <div class="form-group">
                    <label>選択肢</label>
                    <input type="text" class="quiz-choice" placeholder="正解の選択肢" required>
                    <input type="text" class="quiz-choice" placeholder="不正解の選択肢1" required>
                    <input type="text" class="quiz-choice" placeholder="不正解の選択肢2" required>
                    <input type="text" class="quiz-choice" placeholder="不正解の選択肢3" required>
                </div>
                <button type="submit">クイズを作成</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 わくわく学びランド</p>
    </footer>

    <!-- クイズ表示用のモーダル -->
    <div id="quiz-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2 id="modal-quiz-title"></h2>
            <p id="modal-quiz-question"></p>
            <img id="modal-quiz-image" src="" alt="クイズ画像" style="display:none; max-width: 100%; border-radius: 8px;">
            <div id="modal-quiz-choices"></div>
            <p id="modal-quiz-feedback"></p>
        </div>
    </div>

    <script src="user-content.js"></script>
</body>
</html>
