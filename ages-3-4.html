<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3〜4歳 | わくわく学びランド</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>3〜4歳向けコンテンツ</h1>
        <p>知的好奇心と社会性</p>
    </header>

    <main>
        <!-- ゲーム選択ナビゲーション -->
        <div class="game-navigation" role="navigation" aria-label="ゲーム選択">
            <h2>どのゲームであそぶ？</h2>
            <div class="game-selector" role="tablist">
                <button id="classification-game-btn" class="game-nav-button active" 
                        role="tab" aria-selected="true" aria-controls="classification-game-section"
                        aria-label="なかまさがしゲーム - おなじなかまをさがそう">
                    <span class="game-icon" aria-hidden="true">🔍</span>
                    <span class="game-title">なかまさがし</span>
                    <span class="game-description">おなじなかまをさがそう</span>
                </button>
                <button id="hiragana-game-btn" class="game-nav-button"
                        role="tab" aria-selected="false" aria-controls="hiragana-learning-section"
                        aria-label="ひらがな学習ゲーム - もじをおぼえよう">
                    <span class="game-icon" aria-hidden="true">あ</span>
                    <span class="game-title">ひらがな</span>
                    <span class="game-description">もじをおぼえよう</span>
                </button>
                <button id="katakana-game-btn" class="game-nav-button"
                        role="tab" aria-selected="false" aria-controls="katakana-game-section"
                        aria-label="カタカナ学習ゲーム">
                    <span class="game-icon" aria-hidden="true">ア</span>
                    <span class="game-title">カタカナ</span>
                    <span class="game-description">カタカナあそび</span>
                </button>
                <button id="counting-game-btn-3" class="game-nav-button"
                        role="tab" aria-selected="false" aria-controls="counting-game-section"
                        aria-label="かずかぞえゲーム">
                    <span class="game-icon" aria-hidden="true">🔢</span>
                    <span class="game-title">かずかぞえ</span>
                    <span class="game-description">かずをかぞえよう</span>
                </button>
            </div>
        </div>

        <!-- 分類ゲームセクション -->
        <div id="classification-game-section" class="game-section active" 
             role="tabpanel" aria-labelledby="classification-game-btn">
            <div id="classification-game">
                <h2>なかまさがしゲーム</h2>
                <p>ここにゲームが入ります。</p>
            </div>
        </div>
        
        <!-- ひらがな学習セクション -->
        <div id="hiragana-learning-section" class="game-section"
             role="tabpanel" aria-labelledby="hiragana-game-btn" aria-hidden="true">
            <h2>ひらがな学習</h2>
            <div id="hiragana-game-container" role="main" aria-live="polite"></div>
            <div id="progress-summary-container" role="complementary" aria-label="学習進捗"></div>
        </div>

        <!-- カタカナ学習セクション -->
        <div id="katakana-game-section" class="game-section"
             role="tabpanel" aria-labelledby="katakana-game-btn" aria-hidden="true">
            <div id="katakana-game"></div>
        </div>

        <!-- かずかぞえセクション -->
        <div id="counting-game-section" class="game-section"
             role="tabpanel" aria-labelledby="counting-game-btn-3" aria-hidden="true">
            <div id="counting-game"></div>
        </div>
        
        <div id="parent-controls" role="complementary" aria-label="保護者向けコントロール">
            <!-- 保護者向けボタンがここに追加されます -->
        </div>
        
        <a href="index.html" class="back-link">トップにもどる</a>
    </main>

    <footer>
        <p>&copy; 2024 わくわく学びランド</p>
    </footer>

    <script src="classification-game.js"></script>
    <script src="character-data.js"></script>
    <script src="audio-manager.js"></script>
    <script src="progress-tracker.js"></script>
    <script src="badge-system.js"></script>
    <script src="gamification-system.js"></script>
    <script src="progress-display.js"></script>
    <script src="progress-integration.js"></script>
    <script src="hiragana-learning.js"></script>
    <script src="katakana-game.js"></script>
    <script src="counting-game.js"></script>
    <script>
        // スクリプト読み込み確認
        console.log('📦 スクリプト読み込み状況 (3-4歳):');
        console.log('- Character:', typeof Character);
        console.log('- getCharacterSetForAge:', typeof getCharacterSetForAge);
        console.log('- AudioManager:', typeof AudioManager);
        console.log('- ProgressTracker:', typeof ProgressTracker);
        console.log('- HiraganaLearningGame:', typeof HiraganaLearningGame);
        
        // ページ読み込み後に初期化
        document.addEventListener('DOMContentLoaded', function() {
            console.log('📄 DOMContentLoaded イベント発火 (3-4歳)');
            
            // 必須スクリプトの読み込み確認
            const requiredScripts = {
                'HiraganaLearningGame': typeof HiraganaLearningGame !== 'undefined',
                'getCharacterSetForAge': typeof getCharacterSetForAge === 'function',
                'Character': typeof Character !== 'undefined'
            };
            
            const missingScripts = Object.entries(requiredScripts)
                .filter(([name, loaded]) => !loaded)
                .map(([name]) => name);
            
            if (missingScripts.length > 0) {
                console.error('❌ 必須スクリプトが読み込まれていません:', missingScripts);
            } else {
                console.log('✅ すべての必須スクリプトが読み込まれました');
            }
            
            // 進捗統合システムを初期化
            try {
                if (typeof progressIntegration !== 'undefined') {
                    progressIntegration.initialize();
                } else {
                    console.warn('ProgressIntegration not available');
                }
            } catch (error) {
                console.error('Progress integration initialization failed:', error);
            }
            
            let hiraganaGame = null;
            
            // ゲームナビゲーション機能
            function switchToGame(gameType) {
                // すべてのゲームセクションを非表示
                document.querySelectorAll('.game-section').forEach(section => {
                    section.classList.remove('active');
                    section.setAttribute('aria-hidden', 'true');
                });
                
                // すべてのナビゲーションボタンを非アクティブ
                document.querySelectorAll('.game-nav-button').forEach(btn => {
                    btn.classList.remove('active');
                    btn.setAttribute('aria-selected', 'false');
                });
                
                if (gameType === 'classification') {
                    const section = document.getElementById('classification-game-section');
                    const button = document.getElementById('classification-game-btn');
                    section.classList.add('active');
                    section.setAttribute('aria-hidden', 'false');
                    button.classList.add('active');
                    button.setAttribute('aria-selected', 'true');
                } else if (gameType === 'hiragana') {
                    const section = document.getElementById('hiragana-learning-section');
                    const button = document.getElementById('hiragana-game-btn');
                    section.classList.add('active');
                    section.setAttribute('aria-hidden', 'false');
                    button.classList.add('active');
                    button.setAttribute('aria-selected', 'true');
                    
                    // ひらがな学習ゲームを初期化（まだ初期化されていない場合）
                    if (!hiraganaGame) {
                        try {
                            console.log('🎮 ひらがなゲーム初期化開始 (3-4歳)');
                            
                            // 必要なクラスが利用可能かチェック
                            if (typeof HiraganaLearningGame === 'undefined') {
                                throw new Error('HiraganaLearningGame クラスが読み込まれていません');
                            }
                            
                            hiraganaGame = new HiraganaLearningGame(
                                '3-4', 
                                document.getElementById('hiragana-game-container'),
                                {
                                    mode: 'hiragana',
                                    audio: { enabled: true }
                                }
                            );
                            
                            console.log('✅ ひらがなゲーム作成成功');
                            
                            // ゲームと進捗追跡を連携
                            if (typeof progressIntegration !== 'undefined' && 
                                typeof progressIntegration.connectGameToProgress === 'function') {
                                progressIntegration.connectGameToProgress(hiraganaGame);
                                console.log('✅ 進捗追跡と連携完了');
                            }
                            
                            // 進捗サマリーを表示
                            if (typeof progressIntegration !== 'undefined' && 
                                typeof progressIntegration.showProgressSummary === 'function') {
                                progressIntegration.showProgressSummary('progress-summary-container');
                            }
                            
                            console.log('🎉 ひらがなゲーム初期化完了');
                            
                        } catch (error) {
                            console.error('❌ ひらがなゲーム初期化失敗:', error);
                            
                            const container = document.getElementById('hiragana-game-container');
                            if (container) {
                                container.innerHTML = `
                                    <div style="padding: 20px; background: #f8d7da; color: #721c24; border-radius: 8px;">
                                        <h3 style="margin-top: 0;">⚠️ ゲームの読み込みに失敗しました</h3>
                                        <p><strong>エラー:</strong> ${error.message}</p>
                                        <p style="font-size: 14px; margin: 15px 0;">
                                            <a href="debug-mobile.html" style="color: #721c24; text-decoration: underline;">
                                                デバッグページで詳細を確認
                                            </a>
                                        </p>
                                        <button onclick="location.reload()" style="padding: 10px 20px; background: #dc3545; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px;">
                                            ページを再読み込み
                                        </button>
                                    </div>
                                `;
                            }
                        }
                    }
                } else if (gameType === 'katakana') {
                    var section = document.getElementById('katakana-game-section');
                    var button = document.getElementById('katakana-game-btn');
                    section.classList.add('active');
                    section.setAttribute('aria-hidden', 'false');
                    button.classList.add('active');
                    button.setAttribute('aria-selected', 'true');
                } else if (gameType === 'counting') {
                    var section = document.getElementById('counting-game-section');
                    var button = document.getElementById('counting-game-btn-3');
                    section.classList.add('active');
                    section.setAttribute('aria-hidden', 'false');
                    button.classList.add('active');
                    button.setAttribute('aria-selected', 'true');
                }
            }
            
            // ナビゲーションボタンのイベントリスナー
            document.getElementById('classification-game-btn').addEventListener('click', function() {
                switchToGame('classification');
            });

            document.getElementById('hiragana-game-btn').addEventListener('click', function() {
                switchToGame('hiragana');
            });

            document.getElementById('katakana-game-btn').addEventListener('click', function() {
                switchToGame('katakana');
            });

            document.getElementById('counting-game-btn-3').addEventListener('click', function() {
                switchToGame('counting');
            });
            
            // 保護者向けボタンを追加
            try {
                if (typeof progressIntegration !== 'undefined' && 
                    typeof progressIntegration.addParentButton === 'function') {
                    progressIntegration.addParentButton('parent-controls', '保護者向け進捗確認');
                }
            } catch (error) {
                console.error('Failed to add parent button:', error);
            }
            
            // デフォルトで分類ゲームを表示
            switchToGame('classification');
        });
    </script>
</body>
</html>
